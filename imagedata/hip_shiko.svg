<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="20" y="30" font-size="20" fill="#333">股関節: 四股ストレッチ（ワイドスタンス・左右体重移動）</text>
  <circle cx="320" cy="100" r="28" fill="#FFD7A3" stroke="#333"/>
  <rect x="295" y="128" width="50" height="60" rx="8" fill="#9bd3f7" stroke="#333"/>
  <line x1="295" y1="150" x2="240" y2="180" stroke="#333" stroke-width="8"/>
  <line x1="345" y1="150" x2="400" y2="180" stroke="#333" stroke-width="8"/>
  <line x1="270" y1="190" x2="220" y2="260" stroke="#333" stroke-width="10"/>
  <line x1="370" y1="190" x2="420" y2="260" stroke="#333" stroke-width="10"/>
  <text x="260" y="300" font-size="16">↙</text>
  <text x="380" y="300" font-size="16">↘</text>
  <line x1="220" y1="260" x2="180" y2="260" stroke="#e91e63" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="420" y1="260" x2="460" y2="260" stroke="#e91e63" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="320" y="330" text-anchor="middle" font-size="14" fill="#333">膝→つま先方向 / 骨盤は正面</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#e91e63"/>
    </marker>
  </defs>
</svg>
