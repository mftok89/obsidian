<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="20" y="30" font-size="20" fill="#333">肩甲骨: ウォールスライド（肘・手の甲を壁につけて上へ）</text>
  <rect x="480" y="40" width="20" height="280" fill="#e0e0e0"/>
  <circle cx="300" cy="120" r="26" fill="#FFD7A3" stroke="#333"/>
  <rect x="275" y="145" width="50" height="70" rx="8" fill="#9bd3f7" stroke="#333"/>
  <line x1="275" y1="170" x2="250" y2="210" stroke="#333" stroke-width="8"/>
  <line x1="325" y1="170" x2="350" y2="210" stroke="#333" stroke-width="8"/>
  <rect x="440" y="180" width="40" height="10" fill="#9bd3f7" stroke="#333"/>
  <rect x="440" y="220" width="40" height="10" fill="#9bd3f7" stroke="#333"/>
  <line x1="460" y1="225" x2="460" y2="170" stroke="#e91e63" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="510" y="220" font-size="14" fill="#333">↑ スライド</text>
  <text x="505" y="80" font-size="14" fill="#333">┃ 壁</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#e91e63"/>
    </marker>
  </defs>
</svg>
