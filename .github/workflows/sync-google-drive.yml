name: Google Drive と同期

on:
  # 1時間ごとに自動実行（毎時0分）
  schedule:
    - cron: '0 * * * *'

  # 手動実行も引き続き可能
  workflow_dispatch:
    inputs:
      direction:
        description: '同期の方向を選択してください'
        required: true
        default: 'bidirectional'
        type: choice
        options:
          - bidirectional
          - github-to-drive
          - drive-to-github

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 同期方向を決定
        run: |
          # スケジュール実行時は inputs が空なので bidirectional を使用
          DIRECTION="${{ github.event.inputs.direction }}"
          if [ -z "$DIRECTION" ]; then
            DIRECTION="bidirectional"
          fi
          echo "SYNC_DIRECTION=$DIRECTION" >> $GITHUB_ENV
          echo "同期方向: $DIRECTION"

      - name: rclone をインストール
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: rclone を設定
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      # bisync の状態ファイルをキャッシュから復元（初回は空）
      - name: bisync 状態キャッシュを復元
        if: ${{ env.SYNC_DIRECTION == 'bidirectional' }}
        id: cache-bisync
        uses: actions/cache@v4
        with:
          path: ~/.cache/rclone/bisync
          key: rclone-bisync-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            rclone-bisync-state-${{ runner.os }}-

      # ===== 双方向同期 =====
      - name: 双方向同期（初回 - resync あり）
        if: ${{ env.SYNC_DIRECTION == 'bidirectional' && steps.cache-bisync.outputs.cache-hit != 'true' }}
        run: |
          echo "初回実行: --resync フラグを使用して基準点を作成します"
          rclone bisync . gdrive: \
            --drive-root-folder-id "${{ secrets.GDRIVE_FOLDER_ID }}" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --create-empty-src-dirs \
            --resilient \
            --resync \
            -v

      - name: 双方向同期（2回目以降 - 差分のみ）
        if: ${{ env.SYNC_DIRECTION == 'bidirectional' && steps.cache-bisync.outputs.cache-hit == 'true' }}
        run: |
          echo "通常実行: 差分のみ双方向同期します"
          rclone bisync . gdrive: \
            --drive-root-folder-id "${{ secrets.GDRIVE_FOLDER_ID }}" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --create-empty-src-dirs \
            --resilient \
            -v

      # ===== GitHub → Drive =====
      - name: GitHub から Drive へ同期
        if: ${{ env.SYNC_DIRECTION == 'github-to-drive' }}
        run: |
          rclone sync . gdrive: \
            --drive-root-folder-id "${{ secrets.GDRIVE_FOLDER_ID }}" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --create-empty-src-dirs \
            -v

      # ===== Drive → GitHub =====
      - name: Drive から GitHub へ同期
        if: ${{ env.SYNC_DIRECTION == 'drive-to-github' }}
        run: |
          rclone sync gdrive: . \
            --drive-root-folder-id "${{ secrets.GDRIVE_FOLDER_ID }}" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --create-empty-src-dirs \
            -v

      # Drive の変更を GitHub へコミット・プッシュ
      - name: 変更をコミットしてプッシュ
        if: ${{ env.SYNC_DIRECTION != 'github-to-drive' }}
        run: |
          git config user.name "GitHub Actions (Drive Sync)"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし - コミットをスキップします"
          else
            git commit -m "sync: Google Drive から自動同期 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
